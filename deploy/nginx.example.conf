# =============================================================================
# Nginx config sample untuk deploy Maslahat Tani v2 di VPS.
#
# 2 frontend bundle (single dist) + 1 backend NestJS:
#   - admin.maslahattani.my.id  → dist/index.html       (admin panel)
#   - maslahattani.my.id        → dist/webapp/index.html (webapp kasir + BRILink)
#   - api.maslahattani.my.id    → backend NestJS (proxy ke localhost:3000)
#
# Asumsi:
#   - Static files: /var/www/maslahattani/dist
#   - Backend Node.js: localhost:3000 (PM2 / systemd)
#   - SSL/TLS: pakai certbot (Let's Encrypt) — config SSL belum dimasukkan di
#     contoh ini, tinggal `certbot --nginx -d ...` setelah file ini aktif.
# =============================================================================

# ----- Backend API ----- #
server {
  listen 80;
  server_name api.maslahattani.my.id;

  # Proxy ke NestJS backend
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}

# ----- Admin Panel ----- #
server {
  listen 80;
  server_name admin.maslahattani.my.id;
  root /var/www/maslahattani/dist;
  index index.html;

  # SPA fallback: route apa aja → index.html, vue-router yang resolve
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Mencegah akses langsung ke webapp/index.html dari admin domain
  location /webapp/ {
    return 404;
  }
}

# ----- Webapp Kasir + BRILink ----- #
server {
  listen 80;
  server_name maslahattani.my.id www.maslahattani.my.id;
  root /var/www/maslahattani/dist;
  index webapp/index.html;

  # SPA fallback ke webapp bundle (BUKAN admin index.html)
  location / {
    try_files $uri $uri/ /webapp/index.html;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Mencegah akses langsung ke admin bundle dari domain webapp
  location = /index.html {
    return 404;
  }
}

# =============================================================================
# Setelah konfig ini aktif, jalanin:
#   sudo certbot --nginx -d admin.maslahattani.my.id -d maslahattani.my.id \
#                          -d www.maslahattani.my.id -d api.maslahattani.my.id
# untuk auto-generate SSL.
# =============================================================================
